server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:encuestas}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

# --- CONFIGURACIÓN DE LOGS (DESARROLLO) ---
logging:
  level:
    root: INFO
    sv.gob.bcr.onec.inst: ${LOG_LEVEL:DEBUG}
    # Controlado por variables de entorno para máxima flexibilidad
    org.hibernate.SQL: ${LOG_LEVEL_SQL:DEBUG}
    org.hibernate.type.descriptor.sql: ${LOG_LEVEL_DESCRIPTORS:TRACE}
    org.hibernate.orm.jdbc.bind: ${LOG_LEVEL_DESCRIPTORS:TRACE}
